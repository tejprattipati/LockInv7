# project.yml — XcodeGen configuration for LockIn
# Usage: brew install xcodegen && xcodegen generate
# XcodeGen docs: https://github.com/yonaskolb/XcodeGen

name: LockIn

options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  xcodeVersion: "15.0"
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  LockIn:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    info:
      path: LockIn/Info.plist

    entitlements:
      path: LockIn/LockIn.entitlements

    sources:
      - path: LockIn
        excludes:
          - "**/*.md"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.LockIn
        PRODUCT_NAME: LockIn
        DEVELOPMENT_TEAM: ""          # ← Fill in your Apple Team ID from Xcode
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: YES
        INFOPLIST_FILE: LockIn/Info.plist

      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-O"

    dependencies:
      # No external dependencies — everything is system frameworks
      - framework: HealthKit.framework
        embed: false
      - framework: UserNotifications.framework
        embed: false

    preBuildScripts: []
    postBuildScripts: []
